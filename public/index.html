          { "@type": "Course", "position": 3, "name": "Epistemología", "description": "La teoría del conocimiento: qué podemos saber y cómo lo justificamos.", "provider": { "@id": "https://mindshop.cafe/#org" } },

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --teal:  #00C1CA;
      --blue:  #2244CC; --blue-glow:  #5577EE;
      --red:   #CC1A18; --red-glow:   #EE4444;
      --purple:#8022CC; --purple-glow:#AA55EE;
      --green: #18B018; --green-glow: #44DD44;
      --gold:  #CC9800; --gold-glow:  #EEBB22;
      --bg:    #060a0e;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: 'Montserrat', -apple-system, sans-serif;
      cursor: grab;
      user-select: none; -webkit-user-select: none;
    }
    body.dragging { cursor: grabbing; }

    #bg-layer {
      position: fixed; inset: -10%; z-index: 0;
      background: url('./bg.jpg') center/cover no-repeat;
      opacity: 0.72; pointer-events: none;
      will-change: transform;
      transition: opacity 1.5s ease-out;
    }
    #vignette {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(ellipse 75% 75% at 50% 50%, transparent 35%, rgba(6,10,14,0.85) 100%);
      pointer-events: none;
    }

    #fog {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(6,10,14,0.96);
      display: flex; align-items: center; justify-content: center;
      transition: opacity 1.4s ease-out;
      touch-action: none;
    }
    #fog.cleared { opacity: 0; pointer-events: none; touch-action: auto; }
    #splash-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 200; font-size: clamp(1.8rem, 6vw, 2.8rem);
      letter-spacing: 0.44em; color: #fff;
      text-transform: uppercase; text-align: center;
    }
    #splash-sub {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300; font-size: clamp(0.52rem, 1.6vw, 0.68rem);
      letter-spacing: 0.3em; color: rgba(0,193,202,0.72);
      text-transform: uppercase; text-align: center; margin-top: 10px;
    }
    #splash-btn {
      display: block; margin: 56px auto 0;
      background: none; border: 1px solid rgba(255,255,255,0.18);
      border-radius: 5px; padding: 14px 48px;
      font-family: 'Montserrat', sans-serif; font-weight: 300;
      font-size: 0.66rem; letter-spacing: 0.32em; text-transform: uppercase;
      color: rgba(255,255,255,0.6); cursor: pointer;
      transition: border-color 0.22s, color 0.22s;
    }
    #splash-btn:hover, #splash-btn:active {
      border-color: rgba(0,193,202,0.55); color: rgba(0,193,202,0.95);
    }
    #splash-mute {
      display: block; margin: 22px auto 0;
      background: none; border: none; padding: 6px 12px;
      font-family: 'Montserrat', sans-serif; font-size: 1.1rem;
      color: rgba(255,255,255,0.45); cursor: pointer;
      transition: color 0.2s;
    }
    #splash-mute:hover { color: rgba(255,255,255,0.75); }
    #splash-mute.muted { color: rgba(255,255,255,0.18); text-decoration: line-through; }

    #viewport {
      position: fixed; inset: 0; z-index: 2;
      display: flex; align-items: center; justify-content: center;
    }
    #canvas { transform-origin: center center; }
    #sphere-grid {
      width: 1080px; height: 1080px;
      overflow: visible;
      shape-rendering: geometricPrecision;
      text-rendering: geometricPrecision;
    }

    [data-cycle="history"]      { filter: drop-shadow(0 0 8px rgba(85,119,238,0.45)); }
    [data-cycle="ethics"]       { filter: drop-shadow(0 0 8px rgba(238,68,68,0.45));  }
    [data-cycle="aesthetics"]   { filter: drop-shadow(0 0 8px rgba(68,221,68,0.45));  }
    [data-cycle="epistemology"] { filter: drop-shadow(0 0 8px rgba(238,187,34,0.45)); }
    [data-cycle="metaphysics"]  { filter: drop-shadow(0 0 8px rgba(170,85,238,0.45)); }

    @keyframes hub-breathe {
      0%, 100% { opacity: 0.75; }
      50%       { opacity: 1.0; }
    }
    .hub-shine { animation: hub-breathe 3.5s ease-in-out infinite; }

    @keyframes node-click-flash {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }
    .node-click-flash {
      animation: node-click-flash 0.28s ease-out;
      transform-origin: center; transform-box: fill-box;
    }

    #center-portrait {
      position: fixed; border-radius: 50%; overflow: hidden;
      z-index: 4; pointer-events: none;
      width: 0; height: 0;
      transition: opacity 1.4s ease-out;
    }
    #center-portrait img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center 18%;
      filter: grayscale(1) brightness(0.75); display: block;
    }
    .viz-active #center-portrait { opacity: 0.28; }

    /* Ripple */
    @keyframes ripple-out {
      to { transform: translate(-50%,-50%) scale(4.5); opacity: 0; }
    }
    .sg-ripple {
      position: fixed; pointer-events: none; z-index: 25;
      width: 26px; height: 26px; border-radius: 50%;
      border: 1.5px solid currentColor;
      transform: translate(-50%,-50%) scale(1);
      opacity: 0.65;
      animation: ripple-out 0.65s ease-out forwards;
    }

    /* Screensaver / Visualizer */
    #canvas { transition: filter 1.6s ease-out; }
    .viz-active #canvas { filter: brightness(0.06) saturate(0.3); }

    @keyframes viz-core-fade {
      0%   { opacity: 0; }
      14%  { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes viz-glow-expand {
      0%   { opacity: 0;    transform: scale(0.75); }
      14%  { opacity: 0.62; transform: scale(1); }
      100% { opacity: 0;    transform: scale(1.7); }
    }
    @keyframes viz-micro-breathe {
      0%   { opacity: 0;    transform: scale(0.85); }
      25%  { opacity: 0.22; transform: scale(1); }
      100% { opacity: 0;    transform: scale(1.4); }
    }
    @keyframes viz-micro-core {
      0%   { opacity: 0; }
      18%  { opacity: 0.42; }
      100% { opacity: 0; }
    }
    #viz-pulse-layer  { position: fixed; inset: 0; z-index: 5; pointer-events: none; overflow: hidden; }
    .viz-dot          { position: absolute; border-radius: 50%; pointer-events: none; transform-origin: center; mix-blend-mode: screen; }
    .viz-dot.core     { animation: viz-core-fade   4.5s ease-out forwards; }
    .viz-dot.glow     { animation: viz-glow-expand 4.5s ease-out forwards; filter: blur(18px); }
    .viz-dot.glow.outer { filter: blur(40px); }
    .viz-dot.micro    { animation: viz-micro-breathe 8s ease-out forwards; filter: blur(36px); }
    .viz-dot.micro-core { animation: viz-micro-core 5.5s ease-out forwards; filter: blur(3px); }

    #legend, #zoom-controls, #branding { transition: opacity 0.8s ease-out; }
    .viz-active #legend,
    .viz-active #zoom-controls,
    .viz-active #branding { opacity: 0; pointer-events: none; }

    /* Legend */
    #legend {
      position: fixed; top: 22px; left: 22px; z-index: 20;
      display: flex; flex-direction: column; gap: 10px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 9px;
      font-size: 9.5px; font-weight: 300;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      cursor: pointer;
      transition: opacity 0.22s ease-out, color 0.22s ease-out;
    }
    .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    #legend.highlighting .legend-item        { opacity: 0.25; color: rgba(255,255,255,0.25); }
    #legend.highlighting .legend-item.hovered{ opacity: 1;    color: rgba(255,255,255,0.95); }

    /* Controls */
    #zoom-controls {
      position: fixed; bottom: 22px; right: 22px; z-index: 60;
      display: flex; gap: 6px;
    }
    #fog:not(.cleared) ~ #zoom-controls .zoom-btn:not(#fullscreenBtn):not(#muteBtn) {
      opacity: 0; pointer-events: none;
    }
    .zoom-btn {
      width: 34px; height: 34px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.45);
      border-radius: 8px; cursor: pointer;
      font-size: 17px; display: flex;
      align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .zoom-btn:hover  { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.8); }
    .zoom-btn.active { background: rgba(0,193,202,0.15); border-color: rgba(0,193,202,0.4); color: var(--teal); }
    .zoom-btn.muted  { color: rgba(255,255,255,0.2); }

    #branding {
      position: fixed; bottom: 22px; left: 22px; z-index: 20;
      font-size: 9px; font-weight: 300;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.12);
    }

    /* Tooltip */
    .sg-tooltip {
      position: fixed;
      background: rgba(6,10,14,0.92);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px; padding: 5px 11px;
      font-size: 9.5px; font-weight: 300;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      pointer-events: none; z-index: 30;
      opacity: 0; transition: opacity 0.12s; white-space: nowrap;
    }
    .sg-tooltip.visible { opacity: 1; }

    /* Side Panel */
    #panel-backdrop {
      position: fixed; inset: 0; z-index: 39;
      background: transparent;
      display: none;
    }
    #panel-backdrop.show { display: block; }
    @media (max-width: 640px) {
      #panel-backdrop.show { background: rgba(6,10,14,0.55); }
    }

    #panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 310px;
      background: rgba(7,12,18,0.97);
      border-left: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 40;
      transform: translateX(100%);
      transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    #panel.open { transform: translateX(0); }

    @media (max-width: 640px) {
      #panel {
        top: auto; left: 0; right: 0; bottom: 0;
        width: 100%; height: 62%;
        border-left: none;
        border-top: 1px solid rgba(255,255,255,0.08);
        border-radius: 16px 16px 0 0;
        transform: translateY(100%);
      }
      #panel.open { transform: translateY(0); }
    }

    #panel-handle {
      display: none;
      width: 36px; height: 4px;
      background: rgba(255,255,255,0.18);
      border-radius: 2px;
      margin: 14px auto 4px;
      flex-shrink: 0;
    }
    @media (max-width: 640px) { #panel-handle { display: block; } }

    #panel-scroll {
      flex: 1; overflow-y: auto;
      padding: 24px 24px 40px;
      -webkit-overflow-scrolling: touch;
    }
    #panel-scroll::-webkit-scrollbar { width: 3px; }
    #panel-scroll::-webkit-scrollbar-track { background: transparent; }
    #panel-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    #panel-close {
      position: absolute; top: 18px; right: 18px;
      background: none; border: none;
      color: rgba(255,255,255,0.3); font-size: 20px;
      cursor: pointer; line-height: 1; z-index: 1;
      transition: color 0.15s;
    }
    #panel-close:hover { color: rgba(255,255,255,0.7); }
    @media (max-width: 640px) { #panel-close { top: 22px; } }

    #panel-cycle-chip {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 18px;
    }
    #panel-cycle-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }
    #panel-cycle-name {
      font-size: 9px; font-weight: 300;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }
    #panel-lesson-num {
      font-size: 9px; font-weight: 300;
      letter-spacing: 0.14em; color: rgba(255,255,255,0.25);
      margin-bottom: 10px;
    }
    #panel-lesson-title {
      font-size: 17px; font-weight: 300;
      letter-spacing: 0.03em; line-height: 1.45;
      color: rgba(255,255,255,0.92);
      margin-bottom: 18px;
    }
    #panel-divider {
      height: 1px; background: rgba(255,255,255,0.06);
      margin-bottom: 18px;
    }
    #panel-lesson-desc {
      font-size: 12px; font-weight: 300;
      line-height: 1.85; letter-spacing: 0.02em;
      color: rgba(255,255,255,0.5);
    }
    #panel-visited-badge {
      display: none;
      margin-top: 22px;
      font-size: 9px; font-weight: 300;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(255,255,255,0.28);
    }
    #panel-visited-badge.show { display: block; }
    #panel-toggle-visited {
      margin-top: 20px;
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 7px 14px;
      font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 300;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      display: block; width: 100%;
    }
    #panel-toggle-visited:hover { border-color: rgba(255,255,255,0.28); color: rgba(255,255,255,0.6); }

    /* ── Grain overlay ─────────────────────────────────────────────────────── */
    #grain-overlay {
      position: fixed; inset: 0; width: 100%; height: 100%;
      z-index: 9997; pointer-events: none; opacity: 0.07;
    }

    /* ── Custom cursor ─────────────────────────────────────────────────────── */
    /* cursor del sistema siempre visible; el dot es un efecto encima, no reemplazo */
    @media (pointer: coarse) { html, body, body * { cursor: auto !important; } }
    #cursor-dot {
      position: fixed; z-index: 99999; pointer-events: none;
      width: 10px; height: 10px; border-radius: 50%;
      background: white; mix-blend-mode: difference;
      transform: translate(-50%, -50%);
      transition: opacity 0.25s ease;
      opacity: 0; will-change: left, top, width, height;
    }
    #cursor-dot.active   { opacity: 1; }
    #cursor-dot.btn-hover { opacity: 0.55; }
    @media (pointer: coarse) { #cursor-dot { display: none; } }

    /* ── Nav prev/next ─────────────────────────────────────────────────────── */
    #panel-nav {
      display: flex; gap: 8px; margin-top: 20px;
    }
    .panel-nav-btn {
      flex: 1; background: none;
      border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
      padding: 7px 0;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px; font-weight: 300; letter-spacing: 0.08em;
      color: rgba(255,255,255,0.35);
      transition: border-color 0.15s, color 0.15s;
    }
    .panel-nav-btn:not(:disabled):hover { border-color: rgba(255,255,255,0.28); color: rgba(255,255,255,0.7); }
    .panel-nav-btn:disabled { opacity: 0.2; }

    /* ── Prospectus ─────────────────────────────────────────────────────────── */
    #panel-prospectus { margin-top: 12px; }
    #panel-prospectus-btn {
      display: block; width: 100%; text-align: center; text-decoration: none;
      background: none; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
      padding: 7px 14px;
      font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 300; letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      transition: border-color 0.15s, color 0.15s;
    }
    #panel-prospectus-btn:hover { border-color: rgba(255,255,255,0.28); color: rgba(255,255,255,0.7); }
    #panel-buy { margin-top: 10px; }
    #panel-buy-btn {
      display: block; width: 100%; padding: 11px 0;
      border-radius: 6px; border: 1.5px solid currentColor;
      font-size: 13px; font-weight: 600; letter-spacing: 0.04em;
      text-align: center; text-decoration: none;
      background: rgba(255,255,255,0.06);
      color: inherit;
      transition: background 0.2s, opacity 0.2s;
    }
    #panel-buy-btn:hover { background: rgba(255,255,255,0.14); }
    #panel-prospectus-soon {
      display: block; text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 9px; font-weight: 300; letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(255,255,255,0.15); padding: 7px 0;
    }

    /* ── Hub panel overrides ───────────────────────────────────────────────── */
    #panel.hub-panel #panel-toggle-visited,
    #panel.hub-panel #panel-visited-badge,
    #panel.hub-panel #panel-nav { display: none; }

    /* ── Desktop: panel-backdrop lets SVG clicks through ──────────────────── */
    @media (min-width: 641px) { #panel-backdrop { pointer-events: none; } }
  </style>
</head>
<body>

<noscript>
  <div style="max-width:680px;margin:0 auto;padding:48px 24px;color:#cdd6e0;font-family:sans-serif;line-height:1.65;">
    <h1>Mindshop · Sphere Grid</h1>
    <p>Un mapa interactivo de la filosofía: explora conceptos, pensadores y tradiciones a lo largo de cinco ciclos de estudio. Mindshop es una escuela de filosofía en línea en español.</p>
    <h2>Los cinco ciclos</h2>
    <ul>
      <li><strong>Historia</strong> — recorrido por la historia del pensamiento filosófico, de los presocráticos a la filosofía contemporánea.</li>
      <li><strong>Metafísica</strong> — el estudio de la naturaleza última de la realidad, el ser y la existencia.</li>
      <li><strong>Epistemología</strong> — la teoría del conocimiento: qué podemos saber y cómo lo justificamos.</li>
      <li><strong>Estética</strong> — la filosofía del arte, la belleza y la experiencia sensible.</li>
      <li><strong>Ética</strong> — la reflexión sobre el bien, la acción correcta y cómo vivir.</li>
    </ul>
    <p>Activa JavaScript para explorar el mapa interactivo completo.</p>
  </div>
</noscript>

<svg id="grain-overlay" aria-hidden="true">
  <filter id="grain-filter">
    <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#grain-filter)"/>
</svg>
<div id="cursor-dot"></div>

<div id="bg-layer"></div>
<div id="vignette"></div>
<div id="fog">
  <div style="text-align:center;padding:0 32px">
    <div id="splash-title">Mindshop</div>
    <div id="splash-sub">Sphere Grid · Mapa Filosófico</div>
    <button id="splash-btn">Iniciar</button>
    <button id="splash-mute" title="Sonido al iniciar">♪</button>
  </div>

// Devuelve los nodos satélite en el orden de lectura (lección 1 → 12).
// Recorrido en serpentina: anillo exterior → medio → interior, alternando
// dirección en cada anillo, empezando por el nodo alineado con el radio que
// apunta al centro del grid y terminando junto al hub del ciclo.
function getSortedNodes(group) {
  const CX = 540, CY = 540.15;
  const satCircle = ng => [...ng.querySelectorAll('circle')]
    .find(c => Math.abs(parseFloat(c.getAttribute('r')) - 11.81) < 0.5);
  const sats = [...group.querySelectorAll('g')].filter(g => {
    const c = g.querySelector('circle');
    return c && Math.abs(parseFloat(c.getAttribute('r')) - 11.81) < 0.5;
  });
  const hubC = [...group.querySelectorAll('circle')]
    .find(c => Math.abs(parseFloat(c.getAttribute('r')) - 30.93) < 1);
  if (!hubC) return sats;
  const hx = parseFloat(hubC.getAttribute('cx')), hy = parseFloat(hubC.getAttribute('cy'));
  const TAU = Math.PI * 2;
  const norm = a => ((a % TAU) + TAU) % TAU;

  const info = sats.map(g => {
    const c = satCircle(g) || g.querySelector('circle');
    const x = parseFloat(c.getAttribute('cx')), y = parseFloat(c.getAttribute('cy'));
    return { g, dist: Math.hypot(x - hx, y - hy), ang: Math.atan2(y - hy, x - hx) };
  });

  // Agrupar en anillos por distancia al hub (de afuera hacia adentro)
  const rings = [];
  [...info].sort((a, b) => b.dist - a.dist).forEach(n => {
    let ring = rings.find(r => Math.abs(r.dist - n.dist) < 8);
    if (!ring) { ring = { dist: n.dist, nodes: [] }; rings.push(ring); }
    ring.nodes.push(n);
  });

  let startAng = Math.atan2(CY - hy, CX - hx), dir = -1;
  const ordered = [];
  rings.forEach(ring => {
    ring.nodes.forEach(n => { n.t = norm(dir * (n.ang - startAng)); });
    ring.nodes.sort((a, b) => a.t - b.t);
    ordered.push(...ring.nodes);
    startAng = ring.nodes[ring.nodes.length - 1].ang;
    dir = -dir;
  });
  return ordered.map(n => n.g);
}

// ── INIT ──────────────────────────────────────────────────────────────────────

async function init() {
  if (SANITY_ENABLED) {
    try { await fetchFromSanity(); }
    catch (err) { console.warn('Sanity no disponible, usando datos locales:', err); }
  }
  const svgText = await fetch('./sphere-grid.svg').then(r => r.text());
  const parser  = new DOMParser();
  const svgEl   = parser.parseFromString(svgText, 'image/svg+xml').querySelector('svg');
  svgEl.id = 'sphere-grid';
  svgEl.removeAttribute('width'); svgEl.removeAttribute('height');

  const rootG = svgEl.querySelector(':scope > g');

  [...rootG.children].forEach(el => {
    if (el.tagName === 'line') {
      el.style.stroke = '#00C1CA'; el.style.strokeOpacity = '0.45';
    }
  });

  const centerHubEl = [...svgEl.querySelectorAll('circle')]
    .find(c => Math.abs(parseFloat(c.getAttribute('r')) - 50) < 1);
  if (centerHubEl) {
    centerHubData = { cx: parseFloat(centerHubEl.getAttribute('cx')), cy: parseFloat(centerHubEl.getAttribute('cy')), r: 48 };
    centerHubEl.style.fill = '#0a1520';
    centerHubEl.style.stroke = 'rgba(0,193,202,0.6)';
    centerHubEl.style.strokeWidth = '2.5';
  }

  const clusterGroups = [...rootG.children].filter(el => el.tagName === 'g');
  CYCLES.forEach(cycle => {
    const group = clusterGroups.find(g =>
      [...g.querySelectorAll('circle')].some(c =>
        Math.abs(parseFloat(c.getAttribute('cx')) - cycle.hubCx) < 2 &&
        Math.abs(parseFloat(c.getAttribute('cy')) - cycle.hubCy) < 2 &&
        Math.abs(parseFloat(c.getAttribute('r'))  - 30.93)       < 1
      )
    );
    if (!group) return;
    group.setAttribute('data-cycle', cycle.key);
    clusterGroupMap[cycle.key] = group;
    styleClusterGrey(group, cycle);
  });

  [...rootG.children].filter(el => el.tagName === 'g' && !el.getAttribute('data-cycle'))
    .forEach(g => {
      g.querySelectorAll('circle').forEach(c => {
        c.style.fill = '#1a2a3a'; c.style.stroke = 'rgba(104,128,168,0.55)'; c.style.strokeWidth = '1.5';
      });
      g.querySelectorAll('.cls-8,.cls-12').forEach(el => {
        if (el.tagName !== 'circle') el.style.fill = 'rgba(150,170,200,0.7)';
      });
    });

  svgEl.querySelectorAll('.cls-13').forEach(el => {
    if (!el.style.fill) {
      el.style.fill = '#0d1b2a'; el.style.stroke = 'rgba(0,193,202,0.18)'; el.style.strokeWidth = '1';
    }
  });

  const centerText = [...rootG.querySelectorAll('text')].find(t => t.textContent.trim() === 'M');
  if (centerText) centerText.style.display = 'none';

  svgEl.querySelectorAll('.cls-6,.cls-7').forEach(el => {
    const target = el.closest('[data-cycle]') || rootG;
    target.insertBefore(el, target.firstChild);
  });
  [...rootG.children].filter(el => el.tagName === 'line')
    .forEach(l => rootG.insertBefore(l, rootG.firstChild));

  document.getElementById('canvas').appendChild(svgEl);
  updatePortrait();
  setupTooltips(svgEl);
  setupNodeInteraction(svgEl);
  setupLegendHighlight();
  setupPanel();
  setupControls();

  document.getElementById('splash-mute').addEventListener('click', () => {
    soundMuted = !soundMuted;
    const btn = document.getElementById('splash-mute');
    btn.classList.toggle('muted', soundMuted);
    btn.title = soundMuted ? 'Sin sonido' : 'Sonido al iniciar';
    document.getElementById('muteBtn').classList.toggle('muted', soundMuted);
  });

  document.getElementById('splash-btn').addEventListener('click', () => {
    initAudio();
    document.getElementById('fog').classList.add('cleared');
    setTimeout(() => runLoadAnimation(svgEl), 300);
  }, { once: true });
}

// ── STYLING ───────────────────────────────────────────────────────────────────

function styleClusterGrey(group, cycle) {
  group.querySelectorAll('.cls-6,.cls-7').forEach(el => {
    el.style.stroke = GREY_ARC; el.style.strokeOpacity = '0.5';
    el.style.transition = 'stroke 0.5s ease-out';
  });

  const hub = [...group.querySelectorAll('circle')]
    .find(c => Math.abs(parseFloat(c.getAttribute('r')) - 30.93) < 1);
  if (hub) {
    hub.style.fill = GREY_FILL; hub.style.stroke = GREY_STROKE;
    hub.style.strokeWidth = '2.5'; hub.style.cursor = 'pointer';
    hub.style.transition = 'fill 0.6s ease-out, stroke 0.6s ease-out';

    let container = hub;
    while (container.parentElement && container.parentElement !== group)
      container = container.parentElement;
    group.appendChild(container);

    // Inner hub circles (part of the icon) → grey initially
    [...hub.parentElement.querySelectorAll('circle')].forEach(c => {
      if (c === hub || c.classList.contains('hub-shine')) return;
      c.style.fill = GREY_ICON; c.style.transition = 'fill 0.5s ease-out';
    });

    // Glass shine
    const svgEl = group.ownerSVGElement;
    const defs  = svgEl.querySelector('defs');
    const sid   = `hub-shine-${cycle.key}`;
    const grad  = document.createElementNS(NS, 'radialGradient');
    grad.setAttribute('id', sid);
    grad.setAttribute('cx', '38%'); grad.setAttribute('cy', '32%'); grad.setAttribute('r', '58%');
    [['0%','rgba(255,255,255,0.40)'],['45%','rgba(255,255,255,0.06)'],['100%','rgba(255,255,255,0)']].forEach(([off,col]) => {
      const s = document.createElementNS(NS, 'stop');
      s.setAttribute('offset', off); s.setAttribute('stop-color', col); grad.appendChild(s);
    });
    defs.appendChild(grad);
    const shine = document.createElementNS(NS, 'circle');
    shine.setAttribute('cx', hub.getAttribute('cx')); shine.setAttribute('cy', hub.getAttribute('cy'));
    shine.setAttribute('r', hub.getAttribute('r'));   shine.setAttribute('fill', `url(#${sid})`);
    shine.setAttribute('pointer-events', 'none');     shine.classList.add('hub-shine');
    shine.style.opacity = '0'; shine.style.transition = 'opacity 0.8s ease-out';
    hub.parentElement.appendChild(shine);

    hub.parentElement.querySelectorAll('.cls-12,.cls-8').forEach(el => {
      if (el.tagName !== 'circle') { el.style.fill = GREY_ICON; el.style.transition = 'fill 0.5s ease-out'; }
    });
  }

  getSortedNodes(group).forEach(ng => {
    const outer = [...ng.querySelectorAll('circle')].find(c => Math.abs(parseFloat(c.getAttribute('r')) - 11.81) < 0.5);
    const inner = ng.querySelector('.cls-9');
    if (outer) {
      outer.style.fill = GREY_FILL; outer.style.stroke = GREY_STROKE;
      outer.style.strokeWidth = '2'; outer.style.cursor = 'pointer';
      outer.style.transition = 'fill 0.5s ease-out, stroke 0.5s ease-out';
    }
    if (inner) { inner.style.stroke = GREY_STROKE; inner.style.transition = 'stroke 0.5s ease-out'; }
    ng.querySelectorAll('.cls-5').forEach(el => {
      el.style.fill = GREY_ICON; el.style.stroke = GREY_ICON;
      el.style.strokeWidth = '1.2'; el.style.strokeLinejoin = 'round'; el.style.strokeLinecap = 'round';
      el.style.transition = 'fill 0.4s ease-out, stroke 0.4s ease-out';
    });
    ng.querySelectorAll('.cls-12,.cls-8').forEach(el => {
      if (el.tagName !== 'circle') { el.style.fill = GREY_ICON; el.style.transition = 'fill 0.4s ease-out'; }
    });
  });

  group.style.filter = 'none'; group.style.transition = 'filter 0.9s ease-out';
}

// ── LIGHT-UP ──────────────────────────────────────────────────────────────────

function lightUpNode(ng, cycle) {
  const outer = [...ng.querySelectorAll('circle')].find(c => Math.abs(parseFloat(c.getAttribute('r')) - 11.81) < 0.5);
  const inner = ng.querySelector('.cls-9');
  if (outer) { outer.style.fill = cycle.color; outer.style.stroke = cycle.glow; }
  if (inner) inner.style.stroke = cycle.glow;
  ng.querySelectorAll('.cls-5').forEach(el => { el.style.fill = '#ffffff'; el.style.stroke = '#ffffff'; });
  ng.querySelectorAll('.cls-12,.cls-8').forEach(el => { if (el.tagName !== 'circle') el.style.fill = '#ffffff'; });
}

function lightUpClusterHub(group, cycle) {
  group.querySelectorAll('.cls-6,.cls-7').forEach(el => { el.style.stroke = '#00C1CA'; el.style.strokeOpacity = '0.7'; });

  const hub = [...group.querySelectorAll('circle')].find(c => Math.abs(parseFloat(c.getAttribute('r')) - 30.93) < 1);
  if (hub) {
    hub.style.fill = cycle.color; hub.style.stroke = cycle.glow;
    // Inner hub circles → white (they're part of the icon, not the sphere grid)
    [...hub.parentElement.querySelectorAll('circle')].forEach(c => {
      if (c === hub || c.classList.contains('hub-shine')) return;
      c.style.fill = '#ffffff';
    });
    const shine = hub.parentElement.querySelector('.hub-shine');
    if (shine) shine.style.opacity = '1';
    hub.parentElement.querySelectorAll('.cls-12,.cls-8').forEach(el => {
      if (el.tagName !== 'circle') el.style.fill = '#ffffff';
    });
  }

  group.style.filter = GLOW_FILTER[cycle.key];
  clusterLit.add(cycle.key);

  if (clusterLit.size === CYCLES.length) {
    setTimeout(() => {
      CYCLES.forEach(c => { const g = clusterGroupMap[c.key]; if (g) g.style.transition = 'filter 0.22s ease-out'; });
      applyVisitedStyles();
    }, 900);
  }
}

// ── LOAD ANIMATION ────────────────────────────────────────────────────────────

function runLoadAnimation(svgEl) {
  playGridArpeggio();
  const NODE_MS = 68, CLUSTER_MS = 220, START_MS = 450;
  let clusterStart = START_MS;
  CLOCKWISE.forEach(key => {
    const cycle = CYCLES.find(c => c.key === key);
    const group = svgEl.querySelector(`[data-cycle="${key}"]`);
    if (!group || !cycle) return;
    const nodes = getSortedNodes(group);
    nodes.forEach((ng, i) => setTimeout(() => lightUpNode(ng, cycle), clusterStart + i * NODE_MS));
    const hubT = clusterStart + nodes.length * NODE_MS + 60;
    setTimeout(() => lightUpClusterHub(group, cycle), hubT);
    clusterStart += CLUSTER_MS;
  });
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────────

function setupTooltips(svgEl) {
  const tooltip = document.getElementById('tooltip');
  svgEl.addEventListener('mouseover', e => {
    if (selectedNode) return; // panel open — don't show hover tooltip
    const cg = e.target.closest('[data-cycle]');
    if (!cg) { tooltip.classList.remove('visible'); return; }
    const cycle = CYCLES.find(c => c.key === cg.dataset.cycle);
    if (!cycle) return;

    const nodes = [...cg.querySelectorAll('g')].filter(g => {
      const c = g.querySelector('circle');
      return c && Math.abs(parseFloat(c.getAttribute('r')) - 11.81) < 0.5 && !g.querySelector('.cls-9');
    });
    const idx = nodes.indexOf(e.target.closest('g'));
    const lesson = cycle.lessons[idx];
    tooltip.textContent = lesson || cycle.label;
    tooltip.style.borderColor = cycle.color + '55';
    tooltip.classList.add('visible');
  });
  svgEl.addEventListener('mousemove', e => {
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top  = (e.clientY - 10) + 'px';
  });
  svgEl.addEventListener('mouseout', () => tooltip.classList.remove('visible'));
}

function setupNodeInteraction(svgEl) {
  svgEl.addEventListener('click', e => {
    const cg = e.target.closest('[data-cycle]');

    // Click on empty SVG background → deselect
    if (!cg) { clearSelection(); return; }

    const cycle = CYCLES.find(c => c.key === cg.dataset.cycle);
    if (!cycle) return;

    // Satellite node click
    const sortedNodes = getSortedNodes(cg);
    const ng = sortedNodes.find(n => n.contains(e.target));

    if (!ng) {
      // Hub click (circle, orbit ring, or hub icon) → zoom + hub panel
      const ts = 1.8;
      animateTo(-(cycle.hubCx - 540) * ts, -(cycle.hubCy - 540.15) * ts, ts);
      openHubPanel(cycle);
      triggerFeedback('medium'); return;
    }

    const idx = sortedNodes.indexOf(ng);
    const outer = [...ng.querySelectorAll('circle')].find(c => Math.abs(parseFloat(c.getAttribute('r')) - 11.81) < 0.5);
    if (!outer) return;

    // Flash
    outer.classList.remove('node-click-flash');
    void outer.getBoundingClientRect();
    outer.classList.add('node-click-flash');
    outer.addEventListener('animationend', () => outer.classList.remove('node-click-flash'), { once: true });

    // Ripple
    const rect = outer.getBoundingClientRect();
    spawnRipple(rect.left + rect.width / 2, rect.top + rect.height / 2, cycle.color);

    // Select / deselect
    if (selectedNode && selectedNode.ng === ng) {
      clearSelection();
    } else {
      const svgCx = parseFloat(outer.getAttribute('cx'));
      const svgCy = parseFloat(outer.getAttribute('cy'));
      selectNodeFn(ng, cycle, idx, svgCx, svgCy);
    }

    triggerFeedback('light');
  });
}

function setupLegendHighlight() {
  const legendEl = document.getElementById('legend');
  legendEl.querySelectorAll('.legend-item[data-cycle]').forEach(item => {
    const key = item.dataset.cycle;
    const cycle = CYCLES.find(c => c.key === key);
    if (cycle && item.lastChild) item.lastChild.textContent = cycle.label;
    item.addEventListener('mouseenter', () => {
      legendEl.classList.add('highlighting');
      item.classList.add('hovered');
      CYCLES.forEach(c => {
        const g = clusterGroupMap[c.key]; if (!g) return;
        if (c.key === key) {
          const base = clusterLit.has(c.key) ? GLOW_FILTER[c.key] : '';
          g.style.filter = base ? base + ' brightness(1.25)' : 'brightness(1.3)';
        } else {
          g.style.filter = 'brightness(0.28) grayscale(0.5)';
        }
      });
    });
    item.addEventListener('mouseleave', () => {
      legendEl.classList.remove('highlighting');
      item.classList.remove('hovered');
      CYCLES.forEach(c => { const g = clusterGroupMap[c.key]; if (g) g.style.filter = clusterLit.has(c.key) ? GLOW_FILTER[c.key] : 'none'; });
    });
    item.addEventListener('click', () => {
      const cycle = CYCLES.find(c => c.key === key);
      if (!cycle) return;
      const ts = 1.8;
      animateTo(-(cycle.hubCx - 540) * ts, -(cycle.hubCy - 540.15) * ts, ts);
      openHubPanel(cycle);
    });
  });
}

// ── SELECTION ─────────────────────────────────────────────────────────────────

function selectNodeFn(ng, cycle, idx, svgCx, svgCy) {
  if (selectedNode) removeSelectionRing(selectedNode.ng);
  selectedNode = { ng, cycle, idx, svgCx, svgCy };
  addSelectionRing(ng, cycle);
  openPanel(cycle, idx);
  panToNode(svgCx, svgCy);
}

function clearSelection() {
  if (selectedNode) { removeSelectionRing(selectedNode.ng); selectedNode = null; }
  selectedHub = null;
  closePanel();
}

function addSelectionRing(ng, cycle) {
  const outer = [...ng.querySelectorAll('circle')].find(c => Math.abs(parseFloat(c.getAttribute('r')) - 11.81) < 0.5);
  if (!outer) return;
  const ring = document.createElementNS(NS, 'circle');
  ring.setAttribute('cx', outer.getAttribute('cx')); ring.setAttribute('cy', outer.getAttribute('cy'));
  ring.setAttribute('r', String(parseFloat(outer.getAttribute('r')) + 5.5));
  ring.setAttribute('fill', 'none'); ring.setAttribute('stroke', cycle.glow);
  ring.setAttribute('stroke-width', '1.2'); ring.setAttribute('stroke-dasharray', '3 4');
  ring.setAttribute('pointer-events', 'none'); ring.classList.add('selection-ring');
  ring.style.opacity = '0.7';
  ng.appendChild(ring);
}

function removeSelectionRing(ng) {
  ng.querySelectorAll('.selection-ring').forEach(el => el.remove());
}

function panToNode(svgCx, svgCy) {
  const isMobile = window.innerWidth < 640;
  const panelH   = window.innerHeight * 0.62;
  const targetSx = isMobile ? window.innerWidth / 2 : window.innerWidth / 2 - 155;
  const targetSy = isMobile ? (window.innerHeight - panelH) * 0.42 : window.innerHeight / 2;
  const newTx = targetSx - window.innerWidth  / 2 - (svgCx - 540)    * scale;
  const newTy = targetSy - window.innerHeight / 2 - (svgCy - 540.15) * scale;
  animateTo(newTx, newTy, scale);
}

// ── VISITED ───────────────────────────────────────────────────────────────────

function markVisited(key, idx) {
  const id = `${key}:${idx}`;
  if (visited.has(id)) return;
  visited.add(id);
  localStorage.setItem('mindshop-visited', JSON.stringify([...visited]));
  // Apply mark visually now if node exists
  const group = clusterGroupMap[key];
  if (!group) return;
  const nodes = getSortedNodes(group);
  if (nodes[idx]) addVisitedMark(nodes[idx]);
}

function applyVisitedStyles() {
  CYCLES.forEach(cycle => {
    const group = clusterGroupMap[cycle.key]; if (!group) return;
    const nodes = getSortedNodes(group);
    nodes.forEach((ng, i) => { if (visited.has(`${cycle.key}:${i}`)) addVisitedMark(ng); });
  });
}

function addVisitedMark(ng) {
  if (ng.querySelector('.visited-mark')) return;
  const outer = [...ng.querySelectorAll('circle')].find(c => Math.abs(parseFloat(c.getAttribute('r')) - 11.81) < 0.5);
  if (!outer) return;
  const ring = document.createElementNS(NS, 'circle');
  ring.setAttribute('cx', outer.getAttribute('cx')); ring.setAttribute('cy', outer.getAttribute('cy'));
  ring.setAttribute('r', String(parseFloat(outer.getAttribute('r')) + 4.5));
  ring.setAttribute('fill', 'none');
  ring.setAttribute('stroke', 'rgba(255,255,255,0.32)');
  ring.setAttribute('stroke-width', '1.3');
  ring.setAttribute('pointer-events', 'none'); ring.classList.add('visited-mark');
  ng.appendChild(ring);
}

function removeVisitedMark(ng) {
  ng.querySelectorAll('.visited-mark').forEach(el => el.remove());
}

function toggleVisitedFn() {
  if (!selectedNode) return;
  const { cycle, idx } = selectedNode;
  const id = `${cycle.key}:${idx}`;
  if (visited.has(id)) {
    visited.delete(id);
    localStorage.setItem('mindshop-visited', JSON.stringify([...visited]));
    removeVisitedMark(selectedNode.ng);
  } else {
    markVisited(cycle.key, idx);
  }
  syncPanelVisitedUI(id);
}

function syncPanelVisitedUI(id) {
  const isVisited = visited.has(id);
  document.getElementById('panel-visited-badge').classList.toggle('show', isVisited);
  const btn = document.getElementById('panel-toggle-visited');
  if (btn) btn.textContent = isVisited ? 'Desmarcar lección' : 'Marcar como visitada';
}

// ── PANEL ─────────────────────────────────────────────────────────────────────

function setupPanel() {
  document.getElementById('panel-close').addEventListener('click', clearSelection);
  document.getElementById('panel-backdrop').addEventListener('click', clearSelection);
  document.getElementById('panel-toggle-visited').addEventListener('click', toggleVisitedFn);

  document.getElementById('panel-prev').addEventListener('click', () => {
    if (!selectedNode) return;
    const { cycle, idx } = selectedNode;
    if (idx <= 0) return;
    const nodes = getSortedNodes(clusterGroupMap[cycle.key]);
    const ng = nodes[idx - 1];
    if (!ng) return;
    const outer = [...ng.querySelectorAll('circle')].find(c => Math.abs(parseFloat(c.getAttribute('r')) - 11.81) < 0.5);
    if (!outer) return;
    selectNodeFn(ng, cycle, idx - 1, parseFloat(outer.getAttribute('cx')), parseFloat(outer.getAttribute('cy')));
  });

  document.getElementById('panel-next').addEventListener('click', () => {
    if (!selectedNode) return;
    const { cycle, idx } = selectedNode;
    if (idx >= cycle.lessons.length - 1) return;
    const nodes = getSortedNodes(clusterGroupMap[cycle.key]);
    const ng = nodes[idx + 1];
    if (!ng) return;
    const outer = [...ng.querySelectorAll('circle')].find(c => Math.abs(parseFloat(c.getAttribute('r')) - 11.81) < 0.5);
    if (!outer) return;
    selectNodeFn(ng, cycle, idx + 1, parseFloat(outer.getAttribute('cx')), parseFloat(outer.getAttribute('cy')));
  });

  // Mobile swipe-to-dismiss from handle area
  const panel = document.getElementById('panel');
  let dragStart = null, dragCur = 0;
  panel.addEventListener('touchstart', e => {
    const ty = e.touches[0].clientY;
    const pr = panel.getBoundingClientRect();
    if (ty - pr.top < 44) { dragStart = ty; dragCur = 0; }
  }, { passive: true });
  panel.addEventListener('touchmove', e => {
    if (dragStart === null) return;
    dragCur = Math.max(0, e.touches[0].clientY - dragStart);
    panel.style.transform = `translateY(${dragCur}px)`;
  }, { passive: true });
  panel.addEventListener('touchend', () => {
    if (dragStart === null) return;
    panel.style.transform = '';
    if (dragCur > 90) clearSelection();
    dragStart = null; dragCur = 0;
  }, { passive: true });
}

function openPanel(cycle, idx) {
  const desc    = (DESCS[cycle.key] || [])[idx] || '';
  const lesson  = cycle.lessons[idx] || '';
  const id      = `${cycle.key}:${idx}`;

  document.getElementById('panel-cycle-dot').style.background = cycle.color;
  document.getElementById('panel-cycle-name').textContent     = cycle.label;
  document.getElementById('panel-lesson-num').textContent     = `Lección ${idx + 1} de ${cycle.lessons.length}`;
  document.getElementById('panel-lesson-title').textContent   = lesson;
  document.getElementById('panel-lesson-desc').textContent    = desc;
  syncPanelVisitedUI(id);
  updateProspectus(cycle.key);

  const prevBtn = document.getElementById('panel-prev');
  const nextBtn = document.getElementById('panel-next');
  prevBtn.disabled = idx <= 0;
  nextBtn.disabled = idx >= cycle.lessons.length - 1;

  document.getElementById('panel').classList.add('open');
  document.getElementById('panel-backdrop').classList.add('show');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open', 'hub-panel');
  document.getElementById('panel-backdrop').classList.remove('show');
}

function openHubPanel(cycle) {
  if (selectedNode) { removeSelectionRing(selectedNode.ng); selectedNode = null; }
  selectedHub = cycle;
  const progress = cycle.lessons.filter((_, i) => visited.has(`${cycle.key}:${i}`)).length;
  document.getElementById('panel-cycle-dot').style.background  = cycle.color;
  document.getElementById('panel-cycle-name').textContent      = cycle.label;
  document.getElementById('panel-lesson-num').textContent      = `${progress} / ${cycle.lessons.length} lecciones visitadas`;
  document.getElementById('panel-lesson-title').textContent    = cycle.label;
  document.getElementById('panel-lesson-desc').textContent     = (DESCS[cycle.key] || [])[0] || '';
  document.getElementById('panel-visited-badge').classList.remove('show');
  updateProspectus(cycle.key);
  updateBuyButton(cycle);
  document.getElementById('panel').classList.add('open', 'hub-panel');
  document.getElementById('panel-backdrop').classList.add('show');
}

function updateProspectus(cycleKey) {
  const el  = document.getElementById('panel-prospectus');
  const url = PROSPECTUS[cycleKey];
  if (url) {
    el.innerHTML = `<a href="${url}" target="_blank" rel="noopener" id="panel-prospectus-btn">Ver prospectus</a>`;
  } else {
    el.innerHTML = `<span id="panel-prospectus-soon">Próximamente</span>`;
  }
}

function updateBuyButton(cycle) {
  const el = document.getElementById('panel-buy');
  if (cycle.buyUrl) {
    el.innerHTML = `<a href="${cycle.buyUrl}" target="_blank" rel="noopener"
      id="panel-buy-btn" style="color:${cycle.color}; border-color:${cycle.color};">
      Inscribirme en este ciclo
    </a>`;
  } else {
    el.innerHTML = '';
  }
}

// ── RIPPLE ────────────────────────────────────────────────────────────────────

function spawnRipple(sx, sy, color) {
  const el = document.createElement('div');
  el.className = 'sg-ripple';
  el.style.left = sx + 'px'; el.style.top = sy + 'px'; el.style.color = color;
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// ── FEEDBACK ──────────────────────────────────────────────────────────────────

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioCtx.resume();
    if (soundMuted) return;
    const t0 = 0.06;
    [
      { f:  49.0, v: 0.025, det: 0   },  // G1 — sub-bass (reducido para móvil)
      { f:  98.0, v: 0.040, det: 0   },  // G2 — bajo (reducido para móvil)
      { f: 130.8, v: 0.07, det: 1.2  },  // C3
      { f: 261.6, v: 0.09, det: 1.8  },  // C4
      { f: 392.0, v: 0.07, det: 1.8  },  // G4 — quinta
      { f: 587.3, v: 0.09, det: 1.8  },  // D5 — 9ª
      { f: 880.0, v: 0.04, det: 1.8  },  // A5 — 6ª
    ].forEach(({ f, v, det }) => {
      const pairs = det === 0 ? [0] : [-det, det];
      pairs.forEach((d, i) => {
        const osc = audioCtx.createOscillator();
        const g   = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.value = f;
        osc.detune.value = d;
        const vol = (i === 0 || det === 0) ? v : v * 0.38;
        g.gain.setValueAtTime(0, t0);
        g.gain.linearRampToValueAtTime(vol, t0 + 0.65);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 9.5);
        osc.start(t0); osc.stop(t0 + 9.6);
      });
    });
  } catch(e) {}
}

function playGridArpeggio() {
  if (!audioCtx || soundMuted) return;
  try {
    const now  = audioCtx.currentTime;
    // Pool de notas del acorde — se tocan en orden random con timing random
    const pool = [523.3, 784.0, 587.3, 1046.5, 392.0, 880.0, 659.3, 261.6, 1174.7];
    // Barajar Fisher-Yates para que siempre suenen todas pero en orden distinto
    const seq  = [...pool];
    for (let i = seq.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [seq[i], seq[j]] = [seq[j], seq[i]];
    }
    let cursor = now + 0.42;
    seq.forEach(f => {
      cursor += 0.06 + Math.random() * 0.28; // 60-340ms entre hits
      const t     = cursor;
      const vol   = 0.028 + Math.random() * 0.022;
      const decay = 1.1   + Math.random() * 1.3;  // 1.1-2.4s cola
      const osc   = audioCtx.createOscillator();
      const g     = audioCtx.createGain();
      osc.connect(g); g.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.value = f;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(vol, t + 0.011); // ataque muy rápido = metal
      g.gain.exponentialRampToValueAtTime(0.001, t + decay);
      osc.start(t); osc.stop(t + decay + 0.05);
    });
  } catch(e) {}
}

function playTick(type) {
  if (soundMuted || !audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    const now  = audioCtx.currentTime;
    const freq = type === 'light' ? 900 : type === 'medium' ? 520 : type === 'success' ? 780 : 650;
    const dur  = type === 'light' ? 0.055 : type === 'medium' ? 0.075 : 0.065;
    const vol  = type === 'soft' ? 0.020 : 0.036;
    const atk  = 0.007;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(vol, now + atk);
    gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
    osc.start(now); osc.stop(now + dur);
  } catch(e) {}
}

function triggerFeedback(type) {
  // Mobile vibration
  if ('vibrate' in navigator) {
    const patterns = { light:[10], medium:[25], heavy:[50], soft:[8], success:[15,80,15] };
    try { navigator.vibrate(patterns[type] || [10]); } catch(e) {}
  }
  // Desktop audio
  const isMobile = /Mobi|Android/i.test(navigator.userAgent);
  if (!isMobile) playTick(type);
}

// ── VISUALIZER ────────────────────────────────────────────────────────────────

function startVisualizer() {
  if (selectedNode) clearSelection();
  visualizerActive = true;
  document.body.classList.add('viz-active');
  document.getElementById('bg-layer').style.opacity = '0.18';

  const fitScale = Math.min(window.innerWidth, window.innerHeight) * 0.82 / 1080;
  animateTo(0, 0, Math.max(0.45, fitScale), 1400);

  if (!document.getElementById('viz-pulse-layer')) {
    const layer = document.createElement('div');
    layer.id = 'viz-pulse-layer';
    document.body.appendChild(layer);
  }

  scheduleVizPulse();
  startVizVoices();
  setTimeout(() => document.addEventListener('click', exitVizOnClick, true), 900);
  triggerFeedback('soft');
}

function stopVisualizer() {
  visualizerActive = false;
  clearTimeout(visualizerTimer);
  visualizerChimeTimers.forEach(clearTimeout);
  visualizerChimeTimers = [];
  document.removeEventListener('click', exitVizOnClick, true);
  document.body.classList.remove('viz-active');
  document.getElementById('bg-layer').style.opacity = '0.72';
  document.getElementById('viz-pulse-layer')?.remove();
  triggerFeedback('soft');
}

function startVizVoices() {
  VIZ_VOICES.forEach(v => { v.last = -1; scheduleVizVoice(v); });
  const firstVoice = VIZ_VOICES[Math.floor(Math.random() * VIZ_VOICES.length)];
  setTimeout(() => playVizVoice(firstVoice), 420);
}

function scheduleVizVoice(voice) {
  if (!visualizerActive) return;
  const delay = voice.min + Math.random() * (voice.max - voice.min);
  const timer = setTimeout(() => {
    playVizVoice(voice);
    scheduleVizVoice(voice);
  }, delay);
  visualizerChimeTimers.push(timer);
}

function spawnMicroPulse() {
  const layer = document.getElementById('viz-pulse-layer');
  if (!layer) return;
  const litCycles = CYCLES.filter(c => clusterLit.has(c.key));
  if (!litCycles.length) return;
  const cycle = litCycles[Math.floor(Math.random() * litCycles.length)];
  const group = clusterGroupMap[cycle.key];
  if (!group) return;
  const nodes = getSortedNodes(group);
  if (!nodes.length) return;
  const ng = nodes[Math.floor(Math.random() * nodes.length)];
  const target = [...ng.querySelectorAll('circle')].find(c => Math.abs(parseFloat(c.getAttribute('r')) - 11.81) < 0.5);
  if (!target) return;
  const svgCx = parseFloat(target.getAttribute('cx'));
  const svgCy = parseFloat(target.getAttribute('cy'));
  const sx = window.innerWidth  / 2 + tx + (svgCx - 540)    * scale;
  const sy = window.innerHeight / 2 + ty + (svgCy - 540.15) * scale;
  const r  = Math.max(11.81 * scale * 5, 32);
  const el = document.createElement('div');
  el.className = 'viz-dot micro';
  el.style.cssText = `left:${sx}px;top:${sy}px;width:${r*2}px;height:${r*2}px;margin-left:${-r}px;margin-top:${-r}px;background:${cycle.color};`;
  layer.appendChild(el);
  el.addEventListener('animationend', () => el.remove());

  const cr   = Math.max(11.81 * scale * 1.4, 8);
  const core = document.createElement('div');
  core.className = 'viz-dot micro-core';
  core.style.cssText = `left:${sx}px;top:${sy}px;width:${cr*2}px;height:${cr*2}px;margin-left:${-cr}px;margin-top:${-cr}px;background:${cycle.color};`;
  layer.appendChild(core);
  core.addEventListener('animationend', () => core.remove());
}

function playVizVoice(voice) {
  if (!audioCtx || soundMuted || !visualizerActive) return;
  spawnMicroPulse();
  try {
    let idx;
    do { idx = Math.floor(Math.random() * voice.pool.length); }
    while (idx === voice.last && voice.pool.length > 1);
    voice.last = idx;
    const f = voice.pool[idx];
    const now = audioCtx.currentTime;
    const vol = 0.007 + Math.random() * 0.005;
    const decay = 3.5 + Math.random() * 4.5;
    [-1.4, 0, 1.4].forEach((det, i) => {
      const osc = audioCtx.createOscillator();
      const g   = audioCtx.createGain();
      osc.connect(g); g.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.value = f;
      osc.detune.value = det;
      const v2 = i === 1 ? vol : vol * 0.28;
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(v2, now + 0.018);
      g.gain.exponentialRampToValueAtTime(0.001, now + decay);
      osc.start(now); osc.stop(now + decay + 0.1);
    });
  } catch(e) {}
}

function playVizPing(cycle, isHub) {
  if (!audioCtx || soundMuted || !visualizerActive) return;
  try {
    const notes = VIZ_PING_NOTES[cycle.key] || [523.3, 659.3];
    const f     = isHub ? Math.min(...notes) : notes[Math.floor(Math.random() * notes.length)];
    const freq  = isHub ? f / 2 : f;          // hub: nota más grave del pool, una octava abajo
    const vol   = isHub ? 0.024 : 0.016;
    const decay = isHub ? 6.5 + Math.random() * 3 : 4.0 + Math.random() * 2.5;
    const now   = audioCtx.currentTime;
    [-0.8, 0, 0.8].forEach((det, i) => {
      const osc = audioCtx.createOscillator();
      const g   = audioCtx.createGain();
      osc.connect(g); g.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      osc.detune.value = det;
      const v = i === 1 ? vol : vol * 0.22;
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(v, now + 0.009);
      g.gain.exponentialRampToValueAtTime(0.001, now + decay);
      osc.start(now); osc.stop(now + decay + 0.05);
    });
  } catch(e) {}
}

function exitVizOnClick(e) {
  e.stopImmediatePropagation();
  stopVisualizer();
  document.getElementById('visualizerBtn').classList.remove('active');
}

function scheduleVizPulse() {
  if (!visualizerActive) return;
  const delay = 1400 + Math.random() * 2800;
  visualizerTimer = setTimeout(() => {
    spawnVizPulse();
    scheduleVizPulse();
  }, delay);
}

function spawnVizPulse() {
  const layer = document.getElementById('viz-pulse-layer');
  if (!layer) return;

  const litCycles = CYCLES.filter(c => clusterLit.has(c.key));
  if (!litCycles.length) return;
  const cycle = litCycles[Math.floor(Math.random() * litCycles.length)];
  const group = clusterGroupMap[cycle.key];
  if (!group) return;

  const useHub = Math.random() < 0.4;
  let svgCx, svgCy, baseR;

  if (useHub) {
    const hub = [...group.querySelectorAll('circle')].find(c => Math.abs(parseFloat(c.getAttribute('r')) - 30.93) < 1);
    if (!hub) return;
    svgCx = parseFloat(hub.getAttribute('cx'));
    svgCy = parseFloat(hub.getAttribute('cy'));
    baseR = 30.93 * scale;
  } else {
    const nodes = getSortedNodes(group);
    if (!nodes.length) return;
    const ng = nodes[Math.floor(Math.random() * nodes.length)];
    const target = [...ng.querySelectorAll('circle')].find(c => Math.abs(parseFloat(c.getAttribute('r')) - 11.81) < 0.5);
    if (!target) return;
    svgCx = parseFloat(target.getAttribute('cx'));
    svgCy = parseFloat(target.getAttribute('cy'));
    baseR = 11.81 * scale;
  }

  const sx = window.innerWidth  / 2 + tx + (svgCx - 540)    * scale;
  const sy = window.innerHeight / 2 + ty + (svgCy - 540.15) * scale;

  playVizPing(cycle, useHub);

  // Outer soft halo (very large, very blurred)
  const outerR = Math.max(baseR * 9, 52);
  const outer  = document.createElement('div');
  outer.className = 'viz-dot glow outer';
  outer.style.cssText = `left:${sx}px;top:${sy}px;width:${outerR*2}px;height:${outerR*2}px;margin-left:${-outerR}px;margin-top:${-outerR}px;background:${cycle.color};`;
  layer.appendChild(outer);
  outer.addEventListener('animationend', () => outer.remove());

  // Inner tight glow
  const glowR = Math.max(baseR * 4, 28);
  const glow  = document.createElement('div');
  glow.className = 'viz-dot glow';
  glow.style.cssText = `left:${sx}px;top:${sy}px;width:${glowR*2}px;height:${glowR*2}px;margin-left:${-glowR}px;margin-top:${-glowR}px;background:${cycle.color};`;
  layer.appendChild(glow);
  glow.addEventListener('animationend', () => glow.remove());

  // Solid bright core
  const coreR = Math.max(baseR * 1.2, 6);
  const core  = document.createElement('div');
  core.className = 'viz-dot core';
  core.style.cssText = `left:${sx}px;top:${sy}px;width:${coreR*2}px;height:${coreR*2}px;margin-left:${-coreR}px;margin-top:${-coreR}px;background:${cycle.color};`;
  layer.appendChild(core);
  core.addEventListener('animationend', () => core.remove());
}

// ── CONTROLS ──────────────────────────────────────────────────────────────────

function setupControls() {
  document.getElementById('zoomIn').addEventListener('click', () => {
    scale = Math.min(10, scale * 1.25); applyTransform(); triggerFeedback('light');
  });
  document.getElementById('zoomOut').addEventListener('click', () => {
    scale = Math.max(0.12, scale * 0.8); applyTransform(); triggerFeedback('light');
  });
  document.getElementById('zoomReset').addEventListener('click', () => {
    animateTo(0, 0, 0.72); triggerFeedback('soft');
  });

  const vizBtn = document.getElementById('visualizerBtn');
  vizBtn.addEventListener('click', () => {
    if (visualizerActive) { stopVisualizer(); vizBtn.classList.remove('active'); }
    else                  { startVisualizer(); vizBtn.classList.add('active'); }
  });

  const muteBtn = document.getElementById('muteBtn');
  muteBtn.addEventListener('click', () => {
    initAudio();
    soundMuted = !soundMuted;
    muteBtn.classList.toggle('muted', soundMuted);
    muteBtn.title = soundMuted ? 'Sin sonido' : 'Sonido';
    if (!soundMuted) triggerFeedback('soft');
  });

  const fsBtn  = document.getElementById('fullscreenBtn');

  const EXPAND   = 'M1 5V1h4M9 1h4v4M13 9v4H9M5 13H1V9';
  const COLLAPSE = 'M5 1v4H1M13 5h-4V1M9 13v-4h4M1 9h4v4';
  fsBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
    else document.exitFullscreen();
  });
  document.addEventListener('fullscreenchange', () => {

    fsBtn.classList.toggle('active', inFs);
    fsIcon.setAttribute('d', inFs ? COLLAPSE : EXPAND);
    fsBtn.title = inFs ? 'Salir de pantalla completa' : 'Pantalla completa';
  });
}

// ── PAN / ZOOM ────────────────────────────────────────────────────────────────

const canvas   = document.getElementById('canvas');
const viewport = document.getElementById('viewport');
let scale = 0.72, tx = 0, ty = 0;
let dragging = false, startX, startY;
let velX = 0, velY = 0, lastMX = 0, lastMY = 0;
let momentumRaf = null;

function clampPan() {
  const maxTx = 540 * scale + window.innerWidth  * 0.38;
  const maxTy = 540 * scale + window.innerHeight * 0.38;
  tx = Math.max(-maxTx, Math.min(maxTx, tx));
  ty = Math.max(-maxTy, Math.min(maxTy, ty));
}

function applyTransform() {
  clampPan();
  canvas.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  // Parallax background
  const bgEl = document.getElementById('bg-layer');
  if (bgEl) bgEl.style.transform = `translate(${-tx * 0.06}px,${-ty * 0.06}px)`;
  updatePortrait();
}

function updatePortrait() {
  const p = document.getElementById('center-portrait');
  if (!p || !centerHubData) return;
  const { cx, cy, r } = centerHubData;
  const sr = r * scale;
  const sx = window.innerWidth  / 2 + tx + (cx - 540)    * scale;
  const sy = window.innerHeight / 2 + ty + (cy - 540.15) * scale;
  p.style.left = (sx - sr) + 'px'; p.style.top    = (sy - sr) + 'px';
  p.style.width = (sr * 2) + 'px'; p.style.height = (sr * 2) + 'px';
}

function animateTo(targetTx, targetTy, targetScale, duration) {
  duration = duration || 650;
  const startTx = tx, startTy = ty, startScale = scale;
  const t0 = performance.now();
  if (momentumRaf) { cancelAnimationFrame(momentumRaf); momentumRaf = null; }
  function frame(now) {
    const prog = Math.min((now - t0) / duration, 1);
    const ease = 1 - Math.pow(1 - prog, 3);
    tx = startTx + (targetTx - startTx) * ease;
    ty = startTy + (targetTy - startTy) * ease;
    scale = startScale + (targetScale - startScale) * ease;
    applyTransform();
    if (prog < 1) momentumRaf = requestAnimationFrame(frame);
    else momentumRaf = null;
  }
  momentumRaf = requestAnimationFrame(frame);
}

// Mouse drag with inertia
const fogActive = () => !document.getElementById('fog').classList.contains('cleared');

canvas.addEventListener('mousedown', e => {
  if (fogActive()) return;
  dragging = true;
  startX = e.clientX - tx; startY = e.clientY - ty;
  lastMX = e.clientX; lastMY = e.clientY; velX = 0; velY = 0;
  if (momentumRaf) { cancelAnimationFrame(momentumRaf); momentumRaf = null; }
  document.body.classList.add('dragging');
  initAudio();
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  velX = e.clientX - lastMX; velY = e.clientY - lastMY;
  lastMX = e.clientX; lastMY = e.clientY;
  tx = e.clientX - startX; ty = e.clientY - startY;
  applyTransform();
});
window.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false; document.body.classList.remove('dragging');
  (function glide() {
    velX *= 0.88; velY *= 0.88;
    if (Math.abs(velX) < 0.3 && Math.abs(velY) < 0.3) return;
    tx += velX; ty += velY; applyTransform();
    momentumRaf = requestAnimationFrame(glide);
  })();
});

// Wheel: pinch/mouse-wheel → zoom; trackpad → pan
window.addEventListener('wheel', e => {
  e.preventDefault();
  if (fogActive()) return;
  if (momentumRaf) { cancelAnimationFrame(momentumRaf); momentumRaf = null; }
  const isMouseWheel = !e.ctrlKey && Math.abs(e.deltaY) >= 50 && Math.abs(e.deltaX) < 5;
  const isPinch      = e.ctrlKey;
  if (isMouseWheel || isPinch) {
    const vr = viewport.getBoundingClientRect();
    const mx = e.clientX - vr.left - vr.width  / 2;
    const my = e.clientY - vr.top  - vr.height / 2;
    const f  = e.deltaY < 0 ? 1.09 : 0.92;
    const ns = Math.max(0.12, Math.min(10, scale * f));
    tx = mx - (mx - tx) * (ns / scale);
    ty = my - (my - ty) * (ns / scale);
    scale = ns;
  } else {
    tx -= e.deltaX; ty -= e.deltaY;
  }
  applyTransform();
}, { passive: false });

// Touch
let touchDist = null;
window.addEventListener('touchstart', e => {
  if (fogActive()) return;
  if (e.touches.length === 1) {
    dragging = true;
    startX = e.touches[0].clientX - tx; startY = e.touches[0].clientY - ty;
    if (momentumRaf) { cancelAnimationFrame(momentumRaf); momentumRaf = null; }
  } else if (e.touches.length === 2) {
    dragging = false;
    touchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: true });
window.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    tx = e.touches[0].clientX - startX; ty = e.touches[0].clientY - startY; applyTransform();
  } else if (e.touches.length === 2 && touchDist) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    scale = Math.max(0.12, Math.min(10, scale * d / touchDist));
    touchDist = d; applyTransform();
  }
}, { passive: false });
window.addEventListener('touchend', () => { dragging = false; touchDist = null; });

window.addEventListener('resize', applyTransform);

document.addEventListener('visibilitychange', () => {
  if (!visualizerActive) return;
  if (document.hidden) {
    clearTimeout(visualizerTimer);
    visualizerChimeTimers.forEach(clearTimeout);
    visualizerChimeTimers = [];
  } else {
    scheduleVizPulse();
    startVizVoices();
  }
});

window.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (visualizerActive) { stopVisualizer(); document.getElementById('visualizerBtn').classList.remove('active'); }
    else clearSelection();
    return;
  }
  if (e.target !== document.body && e.target !== document.documentElement) return;
  const step = e.shiftKey ? 120 : 40;
  let moved = true;
  switch (e.key) {
    case 'r': case 'R':   animateTo(0, 0, 0.72); break;
    case '+': case '=':   scale = Math.min(10, scale * 1.25); applyTransform(); break;
    case '-': case '_':   scale = Math.max(0.12, scale * 0.8); applyTransform(); break;
    case 'ArrowLeft':     tx += step; applyTransform(); break;
    case 'ArrowRight':    tx -= step; applyTransform(); break;
    case 'ArrowUp':       ty += step; applyTransform(); break;
    case 'ArrowDown':     ty -= step; applyTransform(); break;
    default: moved = false;
  }
  if (moved && ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) {
    e.preventDefault();
    if (momentumRaf) { cancelAnimationFrame(momentumRaf); momentumRaf = null; }
  }
});

// ── Magnetic cursor ────────────────────────────────────────────────────────
(function() {
  const dot = document.getElementById('cursor-dot');
  if (!dot || window.matchMedia('(pointer: coarse)').matches) return;

  // Cache of SVG-space node coords (computed once after init, reused every frame)
  let nodeCache = [];
  function buildNodeCache() {
    nodeCache = [];
    if (typeof CYCLES === 'undefined' || typeof clusterGroupMap === 'undefined') return;
    for (const cycle of CYCLES) {
      const group = clusterGroupMap[cycle.key];
      if (!group) continue;
      for (const ng of getSortedNodes(group)) {
        const c = [...ng.querySelectorAll('circle')].find(c => Math.abs(parseFloat(c.getAttribute('r')) - 11.81) < 0.5);
        if (c) nodeCache.push({ el: c, svgCx: +c.getAttribute('cx'), svgCy: +c.getAttribute('cy'), svgR: 11.81 });
      }
      const hub = [...group.querySelectorAll('circle')].find(c => Math.abs(parseFloat(c.getAttribute('r')) - 30.93) < 1);
      if (hub) nodeCache.push({ el: hub, svgCx: +hub.getAttribute('cx'), svgCy: +hub.getAttribute('cy'), svgR: 30.93 });
    }
  }

  function svgToScreen(cx, cy) {
    return {
      x: window.innerWidth  / 2 + tx + (cx - 540)    * scale,
      y: window.innerHeight / 2 + ty + (cy - 540.15) * scale,
    };
  }

  const SNAP_DIST = 48; // px — radio de atracción
  let mouseX = 0, mouseY = 0, onBtn = false;
  let curX = 0, curY = 0, curW = 10;
  let rafId = null;

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX; mouseY = e.clientY;
    dot.classList.add('active');
    onBtn = !!(e.target.closest('button, [role=button], .legend-item') && !e.target.closest('[data-cycle]'));
    dot.classList.toggle('btn-hover', onBtn);
    if (!rafId) { curX = mouseX; curY = mouseY; rafId = requestAnimationFrame(loop); }
  });
  document.addEventListener('mouseleave', () => dot.classList.remove('active'));

  function loop() {
    // Lazy-build cache on first frame where graph is ready
    if (!nodeCache.length && typeof clusterGroupMap !== 'undefined' && Object.keys(clusterGroupMap).length) buildNodeCache();

    // Find nearest node in screen space
    let snapX = mouseX, snapY = mouseY, snapW = onBtn ? 5 : 10;
    if (!fogActive() && !visualizerActive && nodeCache.length) {
      let minDist = Infinity, nearest = null;
      for (const n of nodeCache) {
        const s = svgToScreen(n.svgCx, n.svgCy);
        const d = Math.hypot(mouseX - s.x, mouseY - s.y);
        if (d < minDist) { minDist = d; nearest = n; }
      }
      if (nearest && minDist < SNAP_DIST) {
        // Posición exacta vía rect del nodo (evita desfases del cálculo SVG→pantalla)
        const r = nearest.el.getBoundingClientRect();
        snapX = r.left + r.width / 2;
        snapY = r.top + r.height / 2;
        snapW = Math.max(nearest.svgR * scale * 2.4, 16);
      }
    }

    // Lerp toward target
    curX += (snapX - curX) * 0.22;
    curY += (snapY - curY) * 0.22;
    curW += (snapW - curW) * 0.18;

    dot.style.left   = curX + 'px';
    dot.style.top    = curY + 'px';
    dot.style.width  = curW + 'px';
    dot.style.height = curW + 'px';

    rafId = requestAnimationFrame(loop);
  }
})();

applyTransform();
init();
</script>
</body>
</html>
